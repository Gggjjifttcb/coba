<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aplikasi web modern untuk membaca dan mendengarkan Al-Quran dengan integrasi API lengkap">
  <meta name="theme-color" content="#2d5016">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Al-Quran">
  
  <title>Al-Quran Digital | Baca & Dengarkan</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232d5016' width='100' height='100'/><text x='50' y='60' font-size='80' fill='white' text-anchor='middle' font-family='Arial'>📖</text></svg>">
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232d5016' width='100' height='100'/><text x='50' y='60' font-size='80' fill='white' text-anchor='middle' font-family='Arial'>📖</text></svg>">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&family=STIX+Two+Text:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- App Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <i class="fas fa-quran"></i>
        <span>Al-Quran Digital</span>
      </div>
      <div class="theme-toggle">
        <button id="themeBtn" class="theme-btn">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari Surah...">
        <i class="fas fa-search"></i>
      </div>

      <div class="surah-list" id="surahList">
        <div class="loading">
          <i class="fas fa-spinner"></i>Memuat data...
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Surah Info -->
      <div class="surah-header" id="surahHeader">
        <div class="surah-info-placeholder">
          <p>Pilih Surah untuk dimulai</p>
        </div>
      </div>

      <!-- Audio Player -->
      <div class="audio-player" id="audioPlayer" style="display: none;">
        <div class="player-header">
          <h3 id="playerSurahName"></h3>
          <button class="close-player" onclick="closeAudioPlayer()">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <div class="player-info">
          <div class="reciter-select">
            <label>🎙️ Pembaca:</label>
            <span style="font-weight: 600; color: #2d5016;">Mishari Al-Afasy (al-Qahira)</span>
          </div>
        </div>

        <div class="player-controls">
          <audio id="audioElement"></audio>
          <button id="playBtn" class="control-btn play-btn" onclick="toggleAudio()">
            <i class="fas fa-play"></i>
          </button>
          <div class="progress-container">
            <span class="time" id="currentTime">0:00</span>
            <input type="range" id="progressBar" class="progress-bar" value="0" onchange="setAudio(this.value)">
            <span class="time" id="duration">0:00</span>
          </div>
          <div class="volume-container">
            <i class="fas fa-volume-high"></i>
            <input type="range" id="volumeSlider" class="volume-slider" value="100" onchange="setVolume(this.value)">
          </div>
        </div>
      </div>

      <!-- Verses Display -->
      <div class="verses-content" id="versesContent">
        <div class="content-placeholder">
          <i class="fas fa-quran"></i>
          <p>Pilih surah dari daftar untuk membaca</p>
        </div>
      </div>

      <!-- Verse Details Modal -->
      <div class="modal" id="verseModal">
        <div class="modal-content">
          <button class="modal-close" onclick="closeModal()">
            <i class="fas fa-times"></i>
          </button>
          <div id="verseDetails"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner">
      <i class="fas fa-spinner-third"></i>
    </div>
  </div>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
