<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="nama">Username: </label>
        <input type="text" id="nama" name="nama">
        <br>
        <label for="pass">Password : </label>
        <input type="password" id="pass" name="pass">
        <br>
        <br>
        <label>Gender :</label> 
        <input type="radio" id ="laki" name="gender" value="laki-laki">
        <label for="laki">Laki-laki</label>
        <input type="radio" id ="perempuan" name="gender" value="perempuan">
        <label for="perempuan">Perempuan</label>
        <br>
        <br>
        <label for="hobi">Hobi :</label>
        <input type="checkbox" id="ingat" name="ingat">
        <label for="ingat">menyanyi</label>
        <input type="checkbox" id="ingat1" name="ingat1">
        <label for="ingat1">menari</label>
        <input type="checkbox" id="ingat2" name="ingat2">
        <label for="ingat2">melukis</label>
        <br>
        <br>
        <textarea name="pesan" id="pesan" cols="30" rows="10" placeholder="Tulis pesan anda disini..."></textarea>
        <br>
        <select name="pekerjaan" id="pekerjaan">
            <option value="pelajar">Pelajar</option>
            <option value="mahasiswa">Mahasiswa</option>
            <option value="karyawan">Karyawan</option>
            <option value="wiraswasta">Wiraswasta</option>
        </select>
        <br>
        <br>
        <button type="submit">Kirim</button>
    </form>
</body>
</html>
