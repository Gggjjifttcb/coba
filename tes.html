<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Popup Slider Panah</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #fff;
      padding: 10px;
      border-radius: 10px;
      position: relative;
      width: 320px;
      text-align: center;
    }

    .close {
      position: absolute;
      top: 5px;
      right: 10px;
      font-size: 20px;
      cursor: pointer;
    }

    .slider {
      position: relative;
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    /* Tombol panah */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 50%;
    }

    .left {
      left: 5px;
    }

    .right {
      right: 5px;
    }

    .arrow:hover {
      background: rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>

<h2>Halaman Utama</h2>

<div class="modal" id="popup">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>

    <div class="slider">
      <button class="arrow left" onclick="prevSlide()">‹</button>

      <a id="linkGambar" href="#" target="_blank">
        <img id="sliderImage" src="">
      </a>

      <button class="arrow right" onclick="nextSlide()">›</button>
    </div>
  </div>
</div>

<script>
 const images = [
    {
      src: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6WeA4cnlQQMhyvvFqDBKavoH_ElGmlRCuGw&s?text=Promo+1",
      link: "https://sbmpoltekpar.kemenpar.go.id/"
    },
    {
      src: "https://unicharmpet.co.id/wp-content/uploads/2025/09/stefanus-fandhy-A3KtBL7ptHE-unsplash-1024x683.jpg?text=Promo+2",
      link: "https://ppl.ac.id/virtual-tour-kampus/"
    }
  ];

  let currentIndex = 0;

  function updateSlide() {
    document.getElementById("sliderImage").src = images[currentIndex].src;
    document.getElementById("linkGambar").href = images[currentIndex].link;
  }

  function nextSlide() {
    currentIndex = (currentIndex + 1) % images.length;
    updateSlide();
  }

  function prevSlide() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    updateSlide();
  }

  function openModal() {
    document.getElementById("popup").style.display = "flex";
    updateSlide();
  }

  function closeModal() {
    document.getElementById("popup").style.display = "none";
  }

  window.onload = function() {
  setTimeout(function() {
    openModal();
  }, 2000); // 100 ms = 1 detik
};
</script>

</body>
</html>
