<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promo & Galeri Modern</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    .header {
      color: #fff;
      margin-bottom: 40px;
      text-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.95;
      font-weight: 300;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease-out;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, #ffffff 0%, #f5f7fa 100%);
      padding: 30px;
      border-radius: 20px;
      position: relative;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transform: scale(0.9);
      animation: slideUp 0.4s ease-out forwards;
    }

    @keyframes slideUp {
      from {
        transform: scale(0.9) translateY(30px);
        opacity: 0;
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .close {
      position: absolute;
      top: -15px;
      right: -15px;
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .close:hover {
      transform: scale(1.1) rotate(90deg);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
    }

    .slider {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .slider-container {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      flex: 1;
    }

    img {
      width: 100%;
      display: block;
      border-radius: 12px;
      animation: imageZoom 0.5s ease-out;
    }

    @keyframes imageZoom {
      from {
        opacity: 0.5;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .arrow {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.2);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
      flex-shrink: 0;
    }

    .arrow:hover {
      transform: scale(1.15);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
      background: linear-gradient(135deg, #764ba2, #667eea);
    }

    .arrow:active {
      transform: scale(0.95);
    }

    .slide-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid rgba(0,0,0,0.1);
    }

    .slide-counter {
      font-size: 0.9rem;
      color: #667eea;
      font-weight: 600;
    }

    .slide-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(102, 126, 234, 0.3);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: #667eea;
      width: 25px;
      border-radius: 4px;
    }

    .dot:hover {
      background: rgba(102, 126, 234, 0.6);
    }

    #linkGambar {
      display: flex;
      text-decoration: none;
      color: inherit;
      flex: 1;
    }

    @media (max-width: 600px) {
      .modal-content {
        padding: 20px;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .arrow {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }

      .slider {
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>✨ Promo Spesial</h1>
      <p>Jangan lewatkan penawaran istimewa kami!</p>
    </div>
  </div>

<div class="modal" id="popup">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">✕</button>

    <div class="slider">
      <button class="arrow" onclick="prevSlide()">‹</button>

      <div class="slider-container">
        <a id="linkGambar" href="#" target="_blank">
          <img id="sliderImage" src="" alt="Promo">
        </a>
      </div>

      <button class="arrow" onclick="nextSlide()">›</button>
    </div>

    <div class="slide-info">
      <span class="slide-counter"><span id="slideNum">1</span> / <span id="totalSlides">2</span></span>
      <div class="slide-dots" id="dots"></div>
    </div>
  </div>
</div>

<script>
  const images = [
    {
      src: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6WeA4cnlQQMhyvvFqDBKavoH_ElGmlRCuGw&s",
      link: "https://sbmpoltekpar.kemenpar.go.id/"
    },
    {
      src: "https://unicharmpet.co.id/wp-content/uploads/2025/09/stefanus-fandhy-A3KtBL7ptHE-unsplash-1024x683.jpg",
      link: "https://ppl.ac.id/virtual-tour-kampus/"
    }
  ];

  let currentIndex = 0;
  let autoPlayTimer;

  function updateSlide() {
    const image = images[currentIndex];
    document.getElementById("sliderImage").src = image.src;
    document.getElementById("linkGambar").href = image.link;
    document.getElementById("slideNum").textContent = currentIndex + 1;
    updateDots();
  }

  function updateDots() {
    document.querySelectorAll(".dot").forEach((dot, index) => {
      dot.classList.toggle("active", index === currentIndex);
    });
  }

  function nextSlide() {
    currentIndex = (currentIndex + 1) % images.length;
    updateSlide();
    resetAutoPlay();
  }

  function prevSlide() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    updateSlide();
    resetAutoPlay();
  }

  function goToSlide(index) {
    currentIndex = index;
    updateSlide();
    resetAutoPlay();
  }

  function openModal() {
    document.getElementById("popup").classList.add("active");
    updateSlide();
    startAutoPlay();
  }

  function closeModal() {
    document.getElementById("popup").classList.remove("active");
    stopAutoPlay();
  }

  function startAutoPlay() {
    autoPlayTimer = setInterval(() => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlide();
    }, 5000);
  }

  function stopAutoPlay() {
    clearInterval(autoPlayTimer);
  }

  function resetAutoPlay() {
    stopAutoPlay();
    startAutoPlay();
  }

  // Initialize dots
  function initDots() {
    const dotsContainer = document.getElementById("dots");
    document.getElementById("totalSlides").textContent = images.length;
    
    images.forEach((_, index) => {
      const dot = document.createElement("div");
      dot.className = "dot" + (index === 0 ? " active" : "");
      dot.onclick = () => goToSlide(index);
      dotsContainer.appendChild(dot);
    });
  }

  // Close modal ketika klik di luar
  window.addEventListener("click", (event) => {
    const modal = document.getElementById("popup");
    if (event.target === modal) {
      closeModal();
    }
  });

  window.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      closeModal();
    }
    if (event.key === "ArrowLeft") {
      prevSlide();
    }
    if (event.key === "ArrowRight") {
      nextSlide();
    }
  });

  window.addEventListener("load", () => {
    initDots();
    setTimeout(() => {
      openModal();
    }, 1000);
  });
</script>

</body>
</html>
